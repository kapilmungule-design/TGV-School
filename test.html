<!DOCTYPE html>

<html lang="en">


<head>


<meta charset="UTF-8">


<title>
ABC International School - Online Test
</title>


<meta name="viewport" content="width=device-width, initial-scale=1.0">


<link rel="stylesheet" href="test.css">


</head>




<body>



<!-- HEADER -->


<header>


<h1>
🏫 ABC International School
</h1>


<h3>
Online Test Series Portal
</h3>


</header>








<!-- TIMER -->


<div class="timer">


⏳ Time Left :

<span id="time">

05:00

</span>


</div>








<!-- QUESTION AREA -->


<div id="questionBox">


<h2>
Loading Question...
</h2>


</div>








<!-- BUTTON AREA -->


<div class="buttonArea">


<button onclick="nextQuestion()">

➡ Next Question

</button>




<button onclick="submitTest()">

✅ Complete Paper

</button>


</div>









<!-- LOADING SCREEN -->


<div id="loading">


<div class="loader">


<h2>
Please Wait...
</h2>


<p>
Generating Your Result Card
</p>


</div>


</div>









<!-- RESULT CARD -->


<div id="result">


</div>









<!-- IMPORTANT

पहले Data load होगा

फिर Test Engine चलेगा

इस order को change मत करना

-->


<script src="students.js"></script>


<script src="tests.js"></script>


<script src="test.js"></script>




</body>


</html>
